# a summary about you
summary: ' I am passionate quantitative analyst/developer with over 5 years of experience in the dynamic world of finance and technology. I thrive on solving complex challenges and leveraging my expertise in R, Python, C#, and F# to create innovative solutions for the capital markets industry. 
With a keen eye for detail and a love for data,  I thrive on exploring the intricate patterns hidden within data and developing 
robust algorithms that drive informed decision-making. 

<br><br>

My ability to bridge the gap between quantitative 
analysis and software development empowers businesses to thrive in a rapidly evolving market environment. 
Being a frequent user of functional programming techniques,I find immense satisfaction in leveraging the power of functional
paradigms to solve complex challenges in innovative ways. I consider it not just a coding style, 
but a philosophy that guides my approach to problem-solving.

<br><br>

I am constantly expanding my knowledge, staying at the forefront of emerging technologies, and 
embracing new tools and techniques. This website is a window into my work, projects, and insights.
Join me on this exciting journey of problem-solving and innovation in the data world. Let us connect and explore the possibilities together!'

